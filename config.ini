[paths]
# ── Model ────────────────────────────────────────────────────────────────────
# Full path to the GGUF model file.
# Supported: TinyLlama-1.1B-Q4_0 (recommended), Phi-2-2.7B-Q4_0
model = /home/pi/models/tinyllama-1.1b-q4_0.gguf

# ── Wordlists ─────────────────────────────────────────────────────────────────
wordlists = /home/pi/wordlists/
rockyou   = /home/pi/wordlists/rockyou.txt
common10k = /home/pi/wordlists/10k-common.txt

# ── Reports ───────────────────────────────────────────────────────────────────
# Directory where JSON + HTML reports are written
reports = /home/pi/reports/

# ── USB mount point (for Button C export) ────────────────────────────────────
usb_mount = /media/pi/

[llm]
# ── Inference settings ────────────────────────────────────────────────────────
# n_ctx: context window tokens. 512 saves RAM; increase to 1024 if memory allows.
n_ctx        = 512

# n_threads: number of CPU threads for inference.
# Pi Zero 2 W has 4 cores; use 3 to leave one for UI.
n_threads    = 3

# max_tokens: max tokens to generate per LLM call.
max_tokens   = 200

# temperature: lower = more deterministic (good for pentesting steps)
temperature  = 0.3

# repeat_penalty: penalise repeating tokens
repeat_penalty = 1.1

[oled]
# ── Display settings ──────────────────────────────────────────────────────────
# I2C address of the SSD1306 (usually 0x3C or 0x3D)
i2c_address = 0x3C

# I2C bus number (1 on Pi, check with `i2cdetect -y 1`)
i2c_bus     = 1

# Display dimensions (SSD1306 on Whisplay Pi AI Hat)
width  = 128
height = 64

# Normal brightness level (0–255)
brightness_normal = 200

# Dimmed brightness when battery 10–20%
brightness_dim = 80

# Refresh rate target (seconds). Must be < 1.0.
refresh_rate = 0.1

[power]
# ── PiSugar 3 I2C settings ────────────────────────────────────────────────────
# PiSugar 3 is typically at 0x57 on I2C bus 1
pisugar_address = 0x57
pisugar_bus     = 1

# Poll interval in seconds for battery level reads
poll_interval = 30

# Battery thresholds (percentage)
threshold_warn  = 20   # Voice warning + OLED dim
threshold_sleep = 10   # Save report + shutdown

[voice]
# ── espeak-ng settings ────────────────────────────────────────────────────────
# Voice: en-gb (British English male, calm)
voice = en-gb

# Speed: words per minute (slower = clearer on small speaker)
speed = 130

# Amplitude (volume): 0–200
amplitude = 100

[security]
# ── Risk thresholds ───────────────────────────────────────────────────────────
# Actions scored above this risk level (1–10) are auto-skipped in Full Auto mode
# 8 = skip destructive actions; 10 = allow everything (not recommended)
max_risk_score = 8

# Require explicit confirmation for risk >= this level
confirm_threshold = 6

[audio]
# ── Push-to-Talk / Walkie-Talkie settings ─────────────────────────────────────
# Path to the Vosk offline speech recognition model directory.
# Download the small English model (~40 MB) with setup.sh, or manually:
#   wget https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip
#   unzip vosk-model-small-en-us-0.15.zip -d /home/pi/models/
vosk_model = /home/pi/models/vosk-model-small-en-us

# Audio capture rate (Hz) — must match the Vosk model (16000 for small-en-us)
rate = 16000

# Microphone input channels (1 = mono, sufficient for speech recognition)
channels = 1

[wifi]
# ── WiFi interface settings ───────────────────────────────────────────────────
# Interface used for monitor mode. Adjust if you add a USB WiFi adapter.
interface = wlan0

# Timeout in seconds for handshake capture
capture_timeout = 60
