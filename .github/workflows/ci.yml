name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install only the lightweight tools needed for linting — skip the heavy
      # hardware packages (llama-cpp-python, RPi.GPIO, etc.) that require
      # either compilation or Raspberry Pi hardware to install successfully.
      - name: Install lint tools
        run: pip install flake8

      - name: Check Python syntax (py_compile)
        run: python -m compileall -q *.py

      - name: Run flake8
        # --select=E9,F limits to: E9xx = runtime/syntax errors,
        # F = pyflakes (undefined names, unused imports, etc.)
        # This keeps CI fast and focused on real defects rather than style.
        run: flake8 *.py --select=E9,F --count --statistics

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on setup.sh
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          severity: warning
